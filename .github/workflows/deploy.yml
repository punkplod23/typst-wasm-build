name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Rust 🦀
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache ⚡
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "typst-wasm-build"

      - name: Install wasm-pack 📦
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM 🏗️
        run: wasm-pack build --target web

      - name: Setup Node 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tests/vue/package-lock.json

      - name: Install Vue Dependencies 📥
        working-directory: ./tests/vue
        run: npm install

      - name: Prepare Assets & Manifest 🛠️
        run: |
          # Ensure the target directories exist within the Vue project
          mkdir -p tests/vue/public/vendor
          mkdir -p tests/vue/public/fonts

          # Copy vendor packages and fonts into the public directory for the Vue app
          cp -r vendor/* tests/vue/public/vendor/ || true # '|| true' to prevent error if vendor is empty
          cp -r public/fonts/* tests/vue/public/fonts/ || true # '|| true' to prevent error if fonts is empty

          # Create .nojekyll to ensure _bg.wasm files are served
          touch tests/vue/public/.nojekyll

          # Copy the WASM binary to public so the browser can fetch it
          cp pkg/my_typst_wasm_bg.wasm tests/vue/public/
          
          # Generate the manifest for packages
          cd tests/vue
          node generate-vendor-manifest.js

      - name: Build Vue App 🚀
        working-directory: ./tests/vue
        run: npm run build

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v5

      - name: Upload Artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: './tests/vue/dist'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4